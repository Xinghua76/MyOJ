spring:
  application:
    name: yuoj-backend
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # todo 取消注释开启分布式 session（需先配置 Redis）
    store-type: redis
    # 30 天过期
    timeout: 2592000
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/code_arena?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
    username: root
    password: 123456

  rabbitmq:
    host: localhost
    port: 5672
    virtual-host: /code-arena
    username: codearena
    password: codearena

  # Redis 配置
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
    password: 123456
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 587
    username: 1952521955@qq.com
    password: wdevfscwbtdycabf
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除字段名
      logic-delete-value: 1 # 逻辑已删除
      logic-not-delete-value: 0 # 逻辑未删除
# 对象存储
# todo 需替换配置
minio:
  endpoint: http://localhost:9000 # MinIO 服务地址
  access-key: minioadmin # MinIO 访问密钥
  secret-key: minioadmin # MinIO 密钥
  bucket: code-arena # 存储桶名称
# 代码沙箱配置
codesandbox:
  type: remote

judge:
  worker:
    enabled: false
  mq:
    exchange: code_arena.judge.exchange
    queue: code_arena.judge.queue.v2
    routing-key: code_arena.judge
    dlx:
      exchange: code_arena.judge.dlx.exchange
      routing-key: code_arena.judge.dlx
    dlq: code_arena.judge.dlq.v2

